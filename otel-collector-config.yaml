receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  resource:
    attributes:
      - key: environment
        value: development
        action: upsert

exporters:
  jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:8889"

  otlphttp/seq:
    endpoint: "http://seq"
    logs_endpoint: "http://seq/ingest/otlp"

  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters:
        - jaeger

    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters:
        - prometheus

    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters:
        - otlphttp/seq
        - debug